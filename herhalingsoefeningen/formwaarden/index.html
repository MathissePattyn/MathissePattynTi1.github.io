<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/style.css">
    <title>Formwaarden</title>
</head>
<body>

<label for="roker">Is roker:</label>
<input type="checkbox" id="roker">
</br>

<label>Moedertaal:</label>
<input type="radio" name="moedertaal" id="nederlands" value="Nederlands"/>
Nederlands
<input type="radio" name="moedertaal" id="frans" value="Frans"/>
Frans
<input type="radio" name="moedertaal" id="engels" value="Engels"/>
Engels
</br>

<label>Favorite buurland:</label>
<select id="selFavBuurland">
 <option>Belgie</option>
 <option>Frankrijk</option>
 <option>Nederland</option>
</select>
</br>

<label>Bestelling</label>
<select multiple="multiple" name="selBestelling">
 <option>Melk</option>
 <option>Biefstuk</option>
 <option>Patattten</option>
 <option>Boontjes</option>
</select>
</br>

<input type="button" value="Upload" id="btnUpload">

<script type="text/javascript" charset="utf-8" src="scripts/code.js"></script>
</body>
</html>
